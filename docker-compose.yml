version: "3.8"
services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloudprobe-dashboard
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "50051:50051"
    environment:
      - CP_DATABASE_URL=postgres://cpuser:cppass@postgres:5432/cloudprobe
      - CP_REDIS_URL=redis:6379
      - CP_MODE=foreign
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    depends_on:
      - postgres
      - redis

  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: cloudprobe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cpuser
      POSTGRES_PASSWORD: cppass
      POSTGRES_DB: cloudprobe
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: cloudprobe-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  nginx:
    image: nginx:alpine
    container_name: cloudprobe-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - dashboard

volumes:
  postgres_data:
  redis_data:
