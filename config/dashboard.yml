server:
  port: 8080
  mode: debug
  host: 0.0.0.0
  read_timeout: 30
  write_timeout: 30

database:
  type: postgres
  dsn: "host=localhost user=cpuser password=cppass dbname=cloudprobe port=5432 sslmode=disable"
  max_open_conns: 25
  max_idle_conns: 5

redis:
  addr: localhost:6379
  password: ""
  db: 0

jwt:
  secret: "cloudprobe-dev-secret-key-change-in-production"
  access_expire: 24
  refresh_expire: 168

agent:
  grpc_addr: 

smtp:
  host: smtp.example.com
  port: 587
  user: ""
  password: ""
  from: "CloudProbe <alerts@example.com>"

backup:
  enabled: false
  email: ""
  schedule: "0 3 * * 0"
  keep_local: 7

xui:
  enabled: false
  panel_url: ""
  api_token: ""
